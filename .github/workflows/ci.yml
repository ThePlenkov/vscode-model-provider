name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Independent gates (run in parallel) ──────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Run ESLint across every workspace
        run: npm run lint -ws --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Build every workspace
        run: npm run build -ws --if-present

  unit-test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Run Vitest across every workspace
        run: npm test -ws --if-present

  # ─── Gates that depend on build (consumer packages need dist/) ───────────

  typecheck:
    name: Typecheck
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      # Re-build inside the typecheck job so the artifact doesn't have to
      # be round-tripped through the GitHub artifact store (faster, simpler).
      - name: Build every workspace (for type resolution)
        run: npm run build -ws --if-present
      - name: Run tsc --noEmit across every workspace
        run: npm run typecheck -ws --if-present

  # ─── Gate that depends on all four ───────────────────────────────────────

  package:
    name: Package VSIX
    needs: [lint, typecheck, unit-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Build every workspace
        run: npm run build -ws --if-present
      - name: Package VSIX
        working-directory: apps/extension
        run: npx @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v7
        with:
          name: vscode-model-provider-${{ github.sha }}
          path: apps/extension/*.vsix
          retention-days: 30

  # ─── Release (push to main only) ──────────────────────────────────────────

  release:
    name: GitHub pre-release
    needs: [package]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: actions/download-artifact@v8
        with:
          name: vscode-model-provider-${{ github.sha }}
          path: apps/extension
      - name: Determine version
        id: version
        working-directory: apps/extension
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "tag=v${PKG_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Generate changelog
        run: |
          git log --oneline -10 > CHANGELOG.txt
          echo "" >> CHANGELOG.txt
          echo "Install:" >> CHANGELOG.txt
          echo "  code --install-extension <downloaded-vsix>" >> CHANGELOG.txt
      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ACP Model Provider ${{ steps.version.outputs.tag }} (Pre-release)"
          body_path: CHANGELOG.txt
          prerelease: true
          generate_release_notes: true
          files: |
            apps/extension/*.vsix