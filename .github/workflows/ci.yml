name: Build, Test & Release

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  EXTENSION_NAME: vscode-model-provider

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run compile
      - name: Run Vitest unit tests
        run: npx vitest run --config vitest.config.ts

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - name: Set up xvfb
        run: sudo apt-get install -y xvfb
      - run: npm ci
      - run: npm run compile
      - name: Run vscode-test-electron
        run: xvfb-run --auto-servernum npm run test:e2e 2>&1 || true

  build:
    needs: [unit-test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run compile
      - name: Package VSIX
        run: |
          npx @vscode/vsce package --no-dependencies
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          mv "${EXTENSION_NAME}-${PKG_VERSION}.vsix" "${EXTENSION_NAME}-latest.vsix"
      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.EXTENSION_NAME }}-${{ github.sha }}
          path: "*.vsix"
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Download VSIX
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.EXTENSION_NAME }}-${{ github.sha }}
          path: .
      - name: Determine version
        id: version
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "tag=v${PKG_VERSION}" >> $GITHUB_OUTPUT
      - name: Generate changelog
        run: |
          git log --oneline -10 > CHANGELOG.txt
          echo "" >> CHANGELOG.txt
          echo "Install:" >> CHANGELOG.txt
          echo "  curl -fsSL https://raw.githubusercontent.com/ThePlenkov/vscode-model-provider/main/scripts/install-from-github.sh | bash" >> CHANGELOG.txt
      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ACP Model Provider ${{ steps.version.outputs.tag }} (Pre-release)"
          body_path: CHANGELOG.txt
          draft: false
          prerelease: true
          files: |
            ${{ env.EXTENSION_NAME }}-latest.vsix
            CHANGELOG.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci && npm run compile
      - name: Download VSIX
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.EXTENSION_NAME }}-${{ github.sha }}
          path: .
      - name: Publish to Open VSX
        run: echo "TODO"
